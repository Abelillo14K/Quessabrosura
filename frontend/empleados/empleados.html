<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empleados - Quessabrosura</title>
  <link rel="stylesheet" href="../menu.css">
  <link rel="stylesheet" href="empleados.css">
</head>
<body class="with-sidebar">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <span>🥐</span>
      <h2>Quessabrosura</h2>
    </div>
    <ul class="sidebar-menu">
      <li><a href="../empleados/empleados.html" class="active"><span class="icon">👨‍🍳</span>Empleados</a></li>
      <li><a href="../ventas/ventas.html"><span class="icon">💰</span>Ventas</a></li>
      <li><a href="../compras/compras.html"><span class="icon">🛒</span>Compras</a></li>
      <li><a href="../productos/productos.html"><span class="icon">🥐</span>Productos</a></li>
      <li><a href="../gastos/gastos.html"><span class="icon">📊</span>Gastos</a></li>
      <li><a href="../cortes/cortes.html"><span class="icon">✂️</span>Cortes</a></li>
    </ul>
    <div class="sidebar-footer">
      <button onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>
  </nav>

  <header>
    <div class="header-content">
      <h1>👨‍🍳 Gestión de Empleados</h1>
      <p class="subtitle">Administración del personal</p>
    </div>
  </header>

  <main>
    <section class="form-section">
      <h2>Nuevo Empleado</h2>
      <form id="empleadoForm">
        <div class="form-row">
          <div class="form-group">
            <label for="nombre">Nombre Completo</label>
            <input type="text" id="nombre" placeholder="Ingrese nombre del empleado" required>
          </div>
          <div class="form-group">
            <label for="rol">Rol / Cargo</label>
            <select id="rol" required>
              <option value="">Seleccione un rol</option>
              <option value="Cocinero">Cocinero</option>
              <option value="Cajero">Cajero</option>
              <option value="Mesero">Mesero</option>
              <option value="Gerente">Gerente</option>
              <option value="Auxiliar">Auxiliar</option>
            </select>
          </div>
          <button type="button" class="btn-add" onclick="crearEmpleado()">➕ Agregar</button>
        </div>
      </form>
    </section>

    <section class="list-section">
      <h2>Lista de Empleados</h2>
      <div class="search-box">
        <input type="text" id="busqueda" placeholder="🔍 Buscar empleado..." oninput="buscarEmpleado()">
      </div>
      <table id="tablaEmpleados">
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Rol</th>
            <th>Fecha Ingreso</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
      </table>
    </section>
  </main>

  <footer>
    <p>Sistema Quessabrosura © 2026</p>
  </footer>

  <div id="mensaje" class="mensaje"></div>
  <script src="empleados.js"></script>
</body>
</html>
