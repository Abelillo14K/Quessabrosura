<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Quessabrosura</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="logo">
        <h1>🥐 Quessabrosura</h1>
        <p class="subtitle">Sistema de Gestión</p>
      </div>
      
      <form id="loginForm" onsubmit="iniciarSesion(event)">
        <div class="form-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" placeholder="Ingrese su usuario" required autocomplete="username">
        </div>
        
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Ingrese su contraseña" required autocomplete="current-password">
        </div>
        
        <button type="submit" class="btn-login" id="btnSubmit">
          <span id="btnText">Ingresar</span>
        </button>
        
        <div id="mensajeError" class="mensaje-error"></div>
      </form>
      
      <div class="login-footer">
        <p>© 2026 Quessabrosura</p>
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
