<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Quessabrosura</title>
  <link rel="stylesheet" href="../menu.css">
  <link rel="stylesheet" href="productos.css">
</head>
<body class="with-sidebar">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <span>🥐</span>
      <h2>Quessabrosura</h2>
    </div>
    <ul class="sidebar-menu">
      <li><a href="../empleados/empleados.html"><span class="icon">👨‍🍳</span>Empleados</a></li>
      <li><a href="../ventas/ventas.html"><span class="icon">💰</span>Ventas</a></li>
      <li><a href="../compras/compras.html"><span class="icon">🛒</span>Compras</a></li>
      <li><a href="../productos/productos.html" class="active"><span class="icon">🥐</span>Productos</a></li>
      <li><a href="../inventario/inventario.html"><span class="icon">📦</span>Inventario</a></li>
      <li><a href="../gastos/gastos.html"><span class="icon">📊</span>Gastos</a></li>
      <li><a href="../cortes/cortes.html"><span class="icon">✂️</span>Cortes</a></li>
    </ul>
    <div class="sidebar-footer">
      <button onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>
  </nav>

  <header>
    <div class="header-content">
      <h1>🥐 Gestión de Productos</h1>
      <p class="subtitle">Administración del inventario</p>
    </div>
  </header>

  <main>
    <section class="form-section">
      <h2>Nuevo Producto</h2>
      <form id="productoForm">
        <div class="form-row">
          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Nombre del producto" required>
          </div>
          <div class="form-group">
            <label for="tipo">Tipo</label>
            <input type="text" id="tipo" placeholder="ej: Pan, Bebida, Postre">
          </div>
          <div class="form-group">
            <label for="precio_venta">Precio Venta</label>
            <input type="number" step="0.01" id="precio_venta" placeholder="Q0.00" min="0">
          </div>
        </div>
        <button type="button" class="btn-add" onclick="crearProducto()">➕ Agregar</button>
      </form>
    </section>

    <section class="list-section">
      <h2>Lista de Productos</h2>
      <div class="search-box">
        <input type="text" id="busqueda" placeholder="🔍 Buscar producto..." oninput="buscarProducto()">
      </div>
      <table id="tablaProductos">
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>P. Venta</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
      </table>
    </section>
  </main>

  <footer>
    <p>Sistema Quessabrosura © 2026</p>
  </footer>

  <div id="modalEditar" class="modal">
    <div class="modal-content">
      <h2>Editar Producto</h2>
      <form id="formEditar">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="editNombre">Nombre</label>
          <input type="text" id="editNombre" required>
        </div>
        <div class="form-group">
          <label for="editTipo">Tipo</label>
          <input type="text" id="editTipo">
        </div>
        <div class="form-group">
          <label for="editPrecioVenta">Precio Venta</label>
          <input type="number" step="0.01" id="editPrecioVenta" min="0">
        </div>
        <div class="form-group">
          <label for="editActivo">
            <input type="checkbox" id="editActivo"> Activo
          </label>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-save" onclick="actualizarProducto()">💾 Guardar</button>
          <button type="button" class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="mensaje" class="mensaje"></div>
  <script src="productos.js"></script>
</body>
</html>
